<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vico - Ai Drawing</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --primary-color: #4a90e2;
            --secondary-color: #6c757d;
            --danger-color: #ff4d4f;
            --border-color: #dee2e6;
            --text-color: #212529;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 40px;
            background: var(--container-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .work-area {
            width: 100%;
            height: 350px;
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        #preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* 캔버스 공통 스타일 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #input-canvas {
            display: none;
            cursor: crosshair;
            z-index: 5;
        }

        #simulation-canvas {
            display: none;
            pointer-events: none;
            z-index: 10;
        }

        .work-area.has-image #preview-image {
            display: block;
        }

        .work-area.has-image .center-msg {
            display: none;
        }

        .work-area.drawing #input-canvas {
            display: block;
        }

        .work-area.drawing .center-msg {
            display: none;
        }

        .work-area.simulating #simulation-canvas {
            display: block;
        }

        .work-area.simulating #preview-image {
            opacity: 0.1;
        }

        .work-area:hover:not(.simulating):not(.drawing) {
            border-color: var(--primary-color);
            background-color: #f0f7ff;
        }

        .center-msg {
            color: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            min-width: 120px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #e9ecef;
            color: var(--secondary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        #file-input {
            display: none;
        }

        #skip-button {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary-color);
            cursor: pointer;
            display: none;
            z-index: 20;
        }

        .work-area.simulating #skip-button {
            display: block;
        }

        /* 프로그레스 바 스타일 */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: transparent;
            z-index: 9999;
            display: none;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }

        /* 햄버거 메뉴 스타일 */
        .menu-container {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 1000;
        }

        .menu-button {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            min-width: auto;
        }

        .menu-button span {
            width: 100%;
            height: 3px;
            background-color: var(--secondary-color);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-dropdown {
            position: absolute;
            top: 35px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 10px;
            display: none;
            width: 220px;
            text-align: left;
        }

        .menu-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-item {
            padding: 12px 15px;
            font-size: 0.9rem;
            color: var(--text-color);
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            background-color: #f8f9fa;
        }

        .menu-item.danger {
            color: var(--danger-color);
        }

        .menu-item.danger:hover {
            background-color: #fff1f0;
        }
    </style>
</head>

<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="container">
        <div style="text-align: right; font-size: 10px; color: #ccc; margin-bottom: -15px; padding-right: 40px;">v1.3</div>
        
        <!-- 햄버거 메뉴 -->
        <div class="menu-container">
            <button class="menu-button" onclick="toggleMenu(event)">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="menu-dropdown" id="menu-dropdown">
                <div class="menu-item danger" onclick="clearServerQueue()">
                    🗑️ 모든 G-Code 삭제하기
                </div>
            </div>
        </div>

        <h1>Ai Drawing</h1>

        <div class="work-area" id="work-area">
            <div class="center-msg" id="center-msg">
                <div class="upload-icon">🎨</div>
                <div class="upload-text">이미지를 업로드하거나 직접 그려보세요</div>
            </div>
            
            <img id="preview-image" src="#" alt="Preview">
            <canvas id="input-canvas"></canvas>
            <canvas id="simulation-canvas"></canvas>
            
            <button id="skip-button" onclick="skipSimulation()">스킵</button>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="button-group" id="button-group">
            <button class="btn-primary" id="btn-left" onclick="handleLeftBtn()">이미지 업로드</button>
            <button class="btn-primary" id="btn-right" onclick="handleRightBtn()">직접 그리기</button>
        </div>
    </div>

    <script>
        const workArea = document.getElementById('work-area');
        const fileInput = document.getElementById('file-input');
        const previewImage = document.getElementById('preview-image');
        const inputCanvas = document.getElementById('input-canvas');
        const simCanvas = document.getElementById('simulation-canvas');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const menuDropdown = document.getElementById('menu-dropdown');
        
        const inputCtx = inputCanvas.getContext('2d');
        const simCtx = simCanvas.getContext('2d');

        let mode = 'idle'; // idle, uploaded, drawing, simulating
        let lastInputMode = 'idle'; 
        let isDrawing = false;
        let animationId = null;
        let currentContours = null;
        let simData = null;

        // 메뉴 토글 함수
        function toggleMenu(e) {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        }

        // 외부 클릭 시 메뉴 닫기
        window.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });

        // 서버 대기열 초기화 함수
        async function clearServerQueue() {
            if (!confirm("서버에 전송된 모든 G-Code 데이터를 삭제하시겠습니까?")) return;

            try {
                const response = await fetch('/api/clear-task', { method: 'POST' });
                
                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`서버 응답 오류 (${response.status}): ${errorMsg}`);
                }

                const result = await response.json();
                if (result.status === 'success') {
                    alert(result.message);
                } else {
                    throw new Error(result.message || "삭제 실패");
                }
            } catch (err) {
                console.error("Clear Task Error:", err);
                alert("삭제 중 오류가 발생했습니다: " + err.message);
            }
        }

        // 초기화 및 캔버스 설정
        function initCanvas() {
            inputCanvas.width = workArea.offsetWidth;
            inputCanvas.height = workArea.offsetHeight;
            simCanvas.width = workArea.offsetWidth;
            simCanvas.height = workArea.offsetHeight;
            
            inputCtx.lineCap = 'round';
            inputCtx.lineJoin = 'round';
            inputCtx.lineWidth = 3;
            inputCtx.strokeStyle = '#000';
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        // 그리기 로직 (마우스)
        inputCanvas.addEventListener('mousedown', startDrawing);
        inputCanvas.addEventListener('mousemove', draw);
        inputCanvas.addEventListener('mouseup', stopDrawing);
        inputCanvas.addEventListener('mouseleave', stopDrawing);

        // 그리기 로직 (터치 - 모바일 지원)
        inputCanvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        inputCanvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        inputCanvas.addEventListener('touchend', stopDrawing);

        function getTouchPos(touchEvent) {
            const rect = inputCanvas.getBoundingClientRect();
            return {
                x: touchEvent.touches[0].clientX - rect.left,
                y: touchEvent.touches[0].clientY - rect.top
            };
        }

        function handleTouchStart(e) {
            if (mode !== 'drawing') return;
            e.preventDefault();
            const pos = getTouchPos(e);
            isDrawing = true;
            inputCtx.beginPath();
            inputCtx.moveTo(pos.x, pos.y);
        }

        function handleTouchMove(e) {
            if (!isDrawing || mode !== 'drawing') return;
            e.preventDefault();
            const pos = getTouchPos(e);
            inputCtx.lineTo(pos.x, pos.y);
            inputCtx.stroke();
        }

        function startDrawing(e) {
            if (mode !== 'drawing') return;
            isDrawing = true;
            inputCtx.beginPath();
            inputCtx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            inputCtx.lineTo(e.offsetX, e.offsetY);
            inputCtx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // 파일 선택 시 이벤트 처리
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    lastInputMode = 'uploaded';
                    // 파일 선택 즉시 서버로 전송하여 처리 및 시뮬레이션 시작
                    processImage(file);
                }
                reader.readAsDataURL(file);
            }
        });

        function setMode(newMode) {
            mode = newMode;
            workArea.className = 'work-area';
            
            if (mode === 'idle') {
                btnLeft.textContent = '이미지 업로드';
                btnLeft.className = 'btn-primary';
                btnRight.textContent = '직접 그리기';
                btnRight.className = 'btn-primary';
                previewImage.src = '#';
                inputCtx.clearRect(0, 0, inputCanvas.width, inputCanvas.height);
                simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
                fileInput.value = '';
                simData = null;
                lastInputMode = 'idle';
            } 
            else if (mode === 'uploaded') {
                workArea.classList.add('has-image');
                btnLeft.textContent = '이미지 변경';
                btnLeft.className = 'btn-secondary';
                btnRight.textContent = '취소';
                btnRight.className = 'btn-danger';
            } 
            else if (mode === 'drawing') {
                workArea.classList.add('drawing');
                btnLeft.textContent = '취소';
                btnLeft.className = 'btn-danger';
                btnRight.textContent = '확인';
                btnRight.className = 'btn-primary';
                lastInputMode = 'drawing';
            }
            else if (mode === 'simulating') {
                workArea.classList.add('simulating');
                if (previewImage.src !== '#') workArea.classList.add('has-image');
                
                btnLeft.textContent = '취소';
                btnLeft.className = 'btn-danger';
                btnRight.textContent = '전송'; // 업로드 -> 전송으로 이름 변경
                btnRight.className = 'btn-primary';
            }
        }

        function handleLeftBtn() {
            if (mode === 'idle' || mode === 'uploaded') {
                fileInput.click();
            } else if (mode === 'drawing' || mode === 'simulating') {
                cancelSimulation();
                setMode('idle');
            }
        }

        function handleRightBtn() {
            if (mode === 'idle') {
                setMode('drawing');
            } else if (mode === 'uploaded') {
                setMode('idle');
            } else if (mode === 'drawing') {
                confirmDrawing();
            } else if (mode === 'simulating') {
                uploadToQueue(); // 서버 대기열로 전송
            }
        }

        async function uploadToQueue() {
            if (!simData || !simData.gcode) {
                alert("전송할 데이터가 없습니다.");
                return;
            }

            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            progressContainer.style.display = 'block';
            progressBar.style.width = '50%';

            try {
                const response = await fetch('/api/push-task', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ gcode: simData.gcode })
                });
                
                if (!response.ok) {
                    const errorDetail = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorDetail}`);
                }

                const result = await response.json();
                
                if (result.status === 'success') {
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        alert("ESP32로 전송 준비 완료! (Task ID: " + result.task_id + ")");
                    }, 500);
                } else {
                    throw new Error(result.message || "서버에서 실패 응답을 보냈습니다.");
                }
            } catch (err) {
                progressContainer.style.display = 'none';
                console.error("Upload Error:", err);
                alert("전송 오류: " + err.message);
            }
        }

        async function confirmDrawing() {
            // 캔버스 내용을 이미지로 변환 (배경을 흰색으로 채움)
            // 투명 배경인 경우 OpenCV에서 외곽선 추출이 제대로 되지 않을 수 있음
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = inputCanvas.width;
            tempCanvas.height = inputCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(inputCanvas, 0, 0);
            
            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            const blob = await (await fetch(dataUrl)).blob();
            processImage(blob, true); // 직접 그리기 모드임을 알림
        }

        async function processImage(imageBlob, isDrawing = false) {
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            // 프로그레스 바 시작
            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';

            try {
                // 1. 이미지 최적화 (모바일 고화질 대응)
                const optimizedBlob = await resizeImage(imageBlob, 1024);
                progressBar.style.width = '30%';

                const formData = new FormData();
                formData.append('file', optimizedBlob, 'image.jpg');
                formData.append('is_drawing', isDrawing);
                
                // 가짜 프로그레스 애니메이션
                let progress = 30;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += (90 - progress) * 0.1;
                        progressBar.style.width = progress + '%';
                    }
                }, 200);

                const response = await fetch('/api/process-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                }, 500);

                if (data.error) throw new Error(data.error);
                if (!data.contours || data.contours.length === 0) {
                    alert("추출된 선이 없습니다. 더 명확하게 그려주세요.");
                    setMode('drawing');
                    return;
                }

                simData = data;
                startSimulation(data);
            } catch (err) {
                progressContainer.style.display = 'none';
                console.error(err);
                alert("처리 중 오류가 발생했습니다: " + err.message);
                setMode('idle');
            }
        }

        // 이미지 크기 조절 함수
        function resizeImage(blob, maxSize) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((result) => resolve(result), 'image/jpeg', 0.8);
                };
                img.src = URL.createObjectURL(blob);
            });
        }

        // 이미지 업로드 시에도 호출
        function startUpload() {
            if (fileInput.files[0]) {
                processImage(fileInput.files[0]);
            }
        }

        // 시뮬레이션 로직
        function startSimulation(data) {
            setMode('simulating');
            if (animationId) cancelAnimationFrame(animationId);

            simCanvas.width = workArea.offsetWidth;
            simCanvas.height = workArea.offsetHeight;
            
            // 비율 계산
            const scale = Math.min(simCanvas.width / data.width, simCanvas.height / data.height);
            const offsetX = (simCanvas.width - data.width * scale) / 2;
            const offsetY = (simCanvas.height - data.height * scale) / 2;

            simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
            simCtx.strokeStyle = "#4a90e2";
            simCtx.lineWidth = (lastInputMode === 'drawing') ? 5 : 2; // 그리기 모드였으면 2배 굵게
            simCtx.lineCap = 'round';
            simCtx.lineJoin = 'round';
            
            let contourIdx = 0;
            let pointIdx = 0;
            const speed = 15; // 그리기 속도 조절

            function animate() {
                if (mode !== 'simulating') return; // 모드가 바뀌면 중단

                if (contourIdx >= data.contours.length) {
                    animationId = null;
                    return;
                }

                for (let i = 0; i < speed; i++) {
                    if (contourIdx >= data.contours.length) break;
                    
                    const contour = data.contours[contourIdx];
                    if (pointIdx === 0) {
                        simCtx.beginPath();
                        simCtx.moveTo(contour[0].x * scale + offsetX, contour[0].y * scale + offsetY);
                    } else {
                        simCtx.lineTo(contour[pointIdx].x * scale + offsetX, contour[pointIdx].y * scale + offsetY);
                        simCtx.stroke();
                    }

                    pointIdx++;
                    if (pointIdx >= contour.length) {
                        contourIdx++;
                        pointIdx = 0;
                    }
                }
                animationId = requestAnimationFrame(animate);
            }
            animationId = requestAnimationFrame(animate);
        }

        function skipSimulation() {
            if (animationId) cancelAnimationFrame(animationId);
            const data = simData;
            if (!data) return;

            const scale = Math.min(simCanvas.width / data.width, simCanvas.height / data.height);
            const offsetX = (simCanvas.width - data.width * scale) / 2;
            const offsetY = (simCanvas.height - data.height * scale) / 2;

            simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
            simCtx.strokeStyle = "#4a90e2";
            simCtx.lineWidth = (lastInputMode === 'drawing') ? 5 : 2; // 스킵 시에도 동일 적용

            data.contours.forEach(contour => {
                simCtx.beginPath();
                simCtx.moveTo(contour[0].x * scale + offsetX, contour[0].y * scale + offsetY);
                for (let i = 1; i < contour.length; i++) {
                    simCtx.lineTo(contour[i].x * scale + offsetX, contour[i].y * scale + offsetY);
                }
                simCtx.stroke();
            });
            animationId = null;
        }

        function cancelSimulation() {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
        }
    </script>
</body>

</html>
